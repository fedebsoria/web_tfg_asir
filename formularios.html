<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="img/index/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de ventas</title>
  <link rel="stylesheet" href="style/formularios.css">
  <script src="script/formularios.js" defer></script>
</head>
<body>
  <h1>Aplicación Web para registro de ventas</h1>

  <main class="sales-layout">
    <section id="order-detail-container">
      <h2>Detalle del pedido</h2>

      <div class="detail-box">
        <p>Aquí aparecerá el detalle del pedido guardado.</p>

        <div class="detail-lines">
          <div class="detail-line">
            <span>Producto 1</span>
            <span>0 x 0</span>
          </div>

          <div class="detail-line">
            <span>Producto 2</span>
            <span>0 x 0</span>
          </div>

          <div class="detail-line">
            <span>Producto 3</span>
            <span>0 x 0</span>
          </div>
        </div>

        <div class="order-total">
          <span>Total pedido</span>
          <span>$0.00</span>
        </div>
      </div>

      <button type="button" id="new-order-button">Nuevo Pedido</button>
    </section>

    <section id="save-sale-container">
      <h2>Guardar venta</h2>

      <form id="save-sale-form">
        <div class="sale-line">
          <label for="producto-1">Producto 1</label>
          <select id="producto-1" name="producto-1" required>
            <option value="">Selecciona un producto</option>
            <option value="producto1">Producto 1</option>
            <option value="producto2">Producto 2</option>
            <option value="producto3">Producto 3</option>
          </select>

          <label for="valor-producto-1">Valor producto 1</label>
          <input type="number" id="valor-producto-1" name="valor-producto-1" min="0" step="0.01" required>

          <label for="cantidad-1">Cantidad 1</label>
          <input type="number" id="cantidad-1" name="cantidad-1" min="1" step="1" required>
        </div>

        <div class="sale-line">
          <label for="producto-2">Producto 2</label>
          <select id="producto-2" name="producto-2">
            <option value="">Selecciona un producto</option>
            <option value="producto1">Producto 1</option>
            <option value="producto2">Producto 2</option>
            <option value="producto3">Producto 3</option>
          </select>

          <label for="valor-producto-2">Valor producto 2</label>
          <input type="number" id="valor-producto-2" name="valor-producto-2" min="0" step="0.01">

          <label for="cantidad-2">Cantidad 2</label>
          <input type="number" id="cantidad-2" name="cantidad-2" min="1" step="1">
        </div>

        <div class="sale-line">
          <label for="producto-3">Producto 3</label>
          <select id="producto-3" name="producto-3">
            <option value="">Selecciona un producto</option>
            <option value="producto1">Producto 1</option>
            <option value="producto2">Producto 2</option>
            <option value="producto3">Producto 3</option>
          </select>

          <label for="valor-producto-3">Valor producto 3</label>
          <input type="number" id="valor-producto-3" name="valor-producto-3" min="0" step="0.01">

          <label for="cantidad-3">Cantidad 3</label>
          <input type="number" id="cantidad-3" name="cantidad-3" min="1" step="1">
        </div>

        <label for="comentarios">Comentarios</label>
        <textarea
          id="comentarios"
          name="comentarios"
          rows="5"
          placeholder="Escribe aquí un comentario"
        ></textarea>

        <input type="submit" value="Guardar">
      </form>
    </section>
  </main>
</body>
</html>
